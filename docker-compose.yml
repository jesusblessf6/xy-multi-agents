services:
  portal-api:
    build:
      context: .
      dockerfile: Dockerfile.portal
    ports:
      - "8001:8001"
    environment:
      - XY_WORKSPACE=/app
    volumes:
      - .:/app
    command: uvicorn portal.server.main:app --host 0.0.0.0 --port 8001

  console-api:
    build:
      context: .
      dockerfile: Dockerfile.console
    ports:
      - "8002:8002"
    environment:
      - XY_WORKSPACE=/app
    volumes:
      - .:/app
      - console-data:/app/data
    command: uvicorn console.server.main:app --host 0.0.0.0 --port 8002

  portal-web:
    build:
      context: ./portal/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"

  console-web:
    build:
      context: ./console/web
      dockerfile: Dockerfile
    ports:
      - "3001:80"

volumes:
  console-data:
